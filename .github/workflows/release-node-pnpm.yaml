name: Release Node.js and pnpm
description: This workflow handles the release process for Node.js and pnpm projects.

on:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: sehv-oss/actions/checkout-repository@main

      - name: Setup environment
        uses: sehv-oss/actions/setup-node-pnpm@main

      - name: Run build
        run: pnpm build

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: sehv-oss/actions/checkout-repository@main

      - name: Setup environment
        uses: sehv-oss/actions/setup-node-pnpm@main

      - name: Run lints
        uses: sehv-oss/actions/lint-pnpm@main

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: sehv-oss/actions/checkout-repository@main

      - name: Setup environment
        uses: sehv-oss/actions/setup-node-pnpm@main

      - name: Setup and run tests
        uses: sehv-oss/actions/test-pnpm@main

  release:
    name: Release
    needs: [build, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: sehv-oss/actions/checkout-repository@main

      - name: Setup environment
        uses: sehv-oss/actions/setup-node-pnpm@main
        with:
          registry-url: https://registry.npmjs.org
          scope: "@sehv-oss"

      - name: Changesets version
        uses: sehv-oss/actions/changesets@main
        with:
          version-command: pnpm changeset:version
          github-token: ${{ secrets.GITHUB_TOKEN }}
