name: Release Node.js and pnpm
description: This workflow handles the release process for Node.js and pnpm projects.

on:
  workflow_call:
    inputs:
      branch:
        description: The branch to check out
        type: string
        default: ""
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository
        with:
          branch: ${{ inputs.branch }}

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Run build
        run: pnpm build

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository
        with:
          branch: ${{ inputs.branch }}

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Run lints
        uses: ./lint-pnpm

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository
        with:
          branch: ${{ inputs.branch }}

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Setup and run tests
        uses: ./test-pnpm

  release:
    name: Release
    needs: [build, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: ./checkout-repository
        with:
          branch: ${{ inputs.branch }}

      - name: Setup environment
        uses: ./setup-node-pnpm
        with:
          registry-url: https://registry.npmjs.org
          scope: "@sehv-oss"

      - name: Changesets version
        uses: ./changesets
        with:
          version-command: pnpm changeset:version
          github-token: ${{ secrets.GITHUB_TOKEN }}
