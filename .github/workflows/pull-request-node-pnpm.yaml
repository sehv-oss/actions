name: Pull Request Node.js and pnpm
description: A GitHub Actions workflow to build, lint and test a Node.js project using pnpm when a pull request is opened or updated. The workflow checks out the repository, sets up the Node.js environment with pnpm, and runs the build, lint and test scripts defined in package.json.

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Run build
        run: pnpm build

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Run lints
        uses: ./lint-pnpm

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: ./checkout-repository

      - name: Setup environment
        uses: ./setup-node-pnpm

      - name: Setup and run tests
        uses: ./test-pnpm
