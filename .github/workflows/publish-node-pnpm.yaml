name: Publish Node.js and pnpm
description: This workflow handles the publish process for Node.js and pnpm projects.

on:
  workflow_call:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: sehv-oss/actions/checkout-repository@main

      - name: Setup environment
        uses: sehv-oss/actions/setup-node-pnpm@main
        with:
          registry-url: https://registry.npmjs.org
          scope: "@sehv-oss"

      - name: Run build
        run: pnpm build

      - name: Changesets publish
        uses: sehv-oss/actions/changesets@main
        with:
          publish-command: pnpm changeset:publish
          github-token: ${{ secrets.GITHUB_TOKEN }}
          registry-token: ${{ secrets.NPM_TOKEN }}
